# Configuration centralisee commune du microservice ms-client.
# Ce fichier doit etre lu par ms-config depuis le depot Git de configuration.

server:
  # Port HTTP du microservice.
  port: ${SERVER_PORT:8081}
  # Permet a Spring de tenir compte des headers Forwarded/X-Forwarded-*
  # envoyes par l'Ingress Kubernetes pour construire les bonnes URLs.
  forward-headers-strategy: framework

spring:
  datasource:
    # Connexion PostgreSQL principale de ms-client.
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dbclient}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      # Joue le schema SQL embarque si necessaire.
      mode: always
      schema-locations: classpath:schema.sql

  jpa:
    hibernate:
      # Mode pratique pour dev/demo : cree ou ajuste la table clients.
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      # Redis partage entre les replicas / pods du microservice.
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  cache:
    # Active Spring Cache avec Redis comme backend distribue.
    type: redis
    redis:
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "ms-client::"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    probes:
      enabled: true

logging:
  level:
    org.hibernate.SQL: INFO
