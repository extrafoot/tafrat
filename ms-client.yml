# Configuration centralisee commune du microservice ms-client.
# Ce fichier est servi par ms-config et complete le
# application.yaml local embarque dans le jar.

server:
  # Port HTTP expose par le microservice.
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    # Connexion PostgreSQL standard.
    # En Kubernetes :
    # jdbc:postgresql://postgres-client:5432/dbclient
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dbclient}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      # Force l'execution du schema SQL meme avec PostgreSQL externe.
      # Cela permet de creer la table clients si elle n'existe pas.
      mode: always
      schema-locations: classpath:schema.sql

  jpa:
    hibernate:
      # On garde une validation stricte du schema.
      # La creation initiale est geree par schema.sql.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    probes:
      enabled: true

logging:
  level:
    org.hibernate.SQL: INFO
