# Configuration centralisee du profil production pour ms-client.
# Ce fichier est combine avec ms-client.yml quand le profil actif est "prod".
# Exemple de resolution via ms-config :
# /ms-client/prod

server:
  # Port configurable en production.
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    # Base PostgreSQL de production.
    # Le nom de base reste dbclient, avec des hotes variables
    # selon Docker, Kubernetes ou un serveur dedie.
    url: jdbc:postgresql://${DB_HOST:postgres-client}:${DB_PORT:5432}/${DB_NAME:dbclient}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

    hikari:
      # Taille maximale du pool de connexions.
      maximum-pool-size: ${DB_POOL_SIZE:10}

      # Nombre minimal de connexions maintenues.
      minimum-idle: ${DB_MIN_IDLE:2}

      # Temps maximum d'attente d'une connexion libre.
      connection-timeout: 30000

  jpa:
    hibernate:
      # En production, on evite de modifier automatiquement le schema.
      ddl-auto: validate

    # On coupe l'affichage SQL pour limiter le bruit dans les logs.
    show-sql: false

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    probes:
      enabled: true

logging:
  level:
    # Logs plus sobres en production.
    root: INFO
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: OFF
