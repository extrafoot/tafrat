# Configuration centralisee commune du microservice ms-vehicule.
# Ce fichier doit etre lu par ms-config depuis le depot Git public.
#
# Il couvre :
# - le port HTTP du service
# - la connexion PostgreSQL
# - le cache Redis distribue
# - JPA / schema SQL
# - Actuator / tracing
# - Swagger

server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: ms-vehicule

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dbvehicule}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  sql:
    init:
      mode: always

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  cache:
    type: redis
    redis:
      use-key-prefix: true
      key-prefix: "ms-vehicule::"
      cache-null-values: false

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics}
  endpoint:
    health:
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:always}
  health:
    probes:
      enabled: ${MANAGEMENT_HEALTH_PROBES_ENABLED:true}
  tracing:
    enabled: true
    sampling:
      probability: 1.0

logging:
  level:
    root: INFO
    ma.tachycom: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
